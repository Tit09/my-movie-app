<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Explorer</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo-line">
      <div class="logo-icon">🎬</div>
    </div>
    <h1>MOVIE <span>EXPLORER</span></h1>
    <p class="tagline">Discover · Explore · Watch</p>

    <div class="search-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" id="search" placeholder="Rechercher un film..." autocomplete="off" />
      <button id="clear-btn" aria-label="Effacer">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  </header>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" data-endpoint="popular">🔥 Populaires</button>
    <button class="filter-btn" data-endpoint="now_playing">🎭 À l'affiche</button>
    <button class="filter-btn" data-endpoint="top_rated">⭐ Les mieux notés</button>
    <button class="filter-btn" data-endpoint="upcoming">🚀 Bientôt</button>
  </div>

  <!-- SECTION LABEL -->
  <div class="section-label">
    <span id="section-name">Films Populaires</span>
    <span id="result-count">0</span>
  </div>

  <!-- GRID -->
  <main>
    <div id="grid"></div>
  </main>

  <!-- MODAL -->
  <div id="modal-backdrop">
    <button class="modal-close" id="modal-close">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <div id="modal">
      <img id="modal-poster" src="" alt="" />
      <div class="modal-body">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-score">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <polygon
              points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" />
          </svg>
          <span id="modal-score-val"></span>
          <span style="color:var(--muted);font-size:13px" id="modal-votes"></span>
        </div>
        <p class="modal-overview" id="modal-overview"></p>
        <div class="modal-tags" id="modal-tags"></div>
      </div>
    </div>
  </div>

  
</body>

  <script defer src="script.js"></script>


</html>
